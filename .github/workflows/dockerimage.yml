name: Build and push

on:
  push:
    branches:
      - "release/*"
  workflow_dispatch:

# ✏️ Change version here
env:
  MC_VERSION: "1.21.11"
  # GitHub Container Registry Image Name
  # Ensure this is all lowercase. format: ghcr.io/<username>/<package_name>
  IMAGE_NAME: ghcr.io/als3bas/zulu-fabricmc

jobs:
  build:
    name: 🏃‍♂️ Build container
    runs-on: ubuntu-latest
    # Permissions required for execution and pushing to GHCR
    permissions:
      contents: read
      packages: write

    steps:
      - name: 💻 Checkout code
        uses: actions/checkout@v4

      # Note: GHCR automatically displays the README of the repository linked to the package.
      # The detailed "sync-readme" action is Docker Hub specific and has been removed.

      - name: 📦 Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: 📦 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ env.MC_VERSION }}

      - name: 📦 Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            MCVERSION=${{ env.MC_VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
