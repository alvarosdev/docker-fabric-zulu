name: Check for Fabric Updates

on:
    schedule:
        - cron: "59 23 * * *" # Todos los días a las 23:59
    workflow_dispatch: # Permite ejecución manual para probar

jobs:
    check-version:
        runs-on: ubuntu-latest
        permissions:
            contents: write # Necesario para hacer git push
            actions: write # Necesario para gatillar workflows

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Check for updates
              id: check
              run: |
                  MC_VERSION=$(grep "MC_VERSION:" .github/workflows/dockerimage.yml | awk -F '"' '{print $2}')
                  if [ -z "$MC_VERSION" ]; then
                     echo "Could not parse MC_VERSION from dockerimage.yml"
                     exit 1
                  fi
                  echo "Minecraft Version: $MC_VERSION"
                  echo "mc_version=$MC_VERSION" >> $GITHUB_OUTPUT

                  if [ -f fabric_version.txt ]; then
                    STORED_VERSION=$(cat fabric_version.txt)
                  else
                    STORED_VERSION="none"
                  fi
                  echo "Stored version: $STORED_VERSION"

                  LATEST_VERSION=$(curl -s https://meta.fabricmc.net/v2/versions/loader | jq -r '.[0].version')

                  if [ -z "$LATEST_VERSION" ] || [ "$LATEST_VERSION" = "null" ]; then
                    echo "Error fetching latest version"
                    exit 1
                  fi
                  echo "Latest Fabric version: $LATEST_VERSION"

                  if [ "$STORED_VERSION" != "$LATEST_VERSION" ]; then
                    echo "New version detected!"
                    echo "new_version=$LATEST_VERSION" >> $GITHUB_OUTPUT
                    echo "update_needed=true" >> $GITHUB_OUTPUT
                    
                    echo "$LATEST_VERSION" > fabric_version.txt
                  else
                    echo "Versions match. No update needed."
                    echo "update_needed=false" >> $GITHUB_OUTPUT
                  fi

            - name: Create Release Branch and Push
              if: steps.check.outputs.update_needed == 'true'
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  NEW_VERSION="${{ steps.check.outputs.new_version }}"
                  MC_VERSION="${{ steps.check.outputs.mc_version }}"
                  BRANCH_NAME="release/${MC_VERSION}-${NEW_VERSION}"

                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"

                  git add fabric_version.txt
                  git commit -m "chore: update tracked fabric version to $NEW_VERSION"
                  git push origin HEAD:main || echo "⚠️ Could not push to main. State not saved."

                  git checkout -b "$BRANCH_NAME"
                  git push origin "$BRANCH_NAME"
